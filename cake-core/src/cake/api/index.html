<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cake</title>
<style>
:root {
    --color-brand-50: oklch(0.97 0.02 280);
    --color-brand-100: oklch(0.93 0.04 280);
    --color-brand-200: oklch(0.87 0.07 280);
    --color-brand-300: oklch(0.78 0.12 280);
    --color-brand-400: oklch(0.68 0.17 275);
    --color-brand-500: oklch(0.58 0.22 270);
    --color-brand-600: oklch(0.50 0.22 270);
    --color-brand-700: oklch(0.43 0.19 270);
    --color-brand-800: oklch(0.36 0.15 270);
    --color-brand-900: oklch(0.28 0.11 270);
    --color-brand-950: oklch(0.20 0.08 270);

    --color-surface-0: oklch(0.13 0.01 270);
    --color-surface-50: oklch(0.16 0.01 270);
    --color-surface-100: oklch(0.19 0.01 270);
    --color-surface-200: oklch(0.23 0.015 270);
    --color-surface-300: oklch(0.30 0.015 270);
    --color-surface-400: oklch(0.40 0.015 270);
    --color-surface-500: oklch(0.55 0.01 270);
    --color-surface-600: oklch(0.70 0.01 270);
    --color-surface-700: oklch(0.82 0.005 270);
    --color-surface-800: oklch(0.90 0.005 270);
    --color-surface-900: oklch(0.95 0.005 270);
    --color-surface-950: oklch(0.98 0.002 270);

    --color-accent-400: oklch(0.75 0.18 165);
    --color-accent-500: oklch(0.68 0.19 165);
    --color-accent-600: oklch(0.60 0.17 165);

    --color-success: oklch(0.72 0.19 145);
    --color-warning: oklch(0.80 0.18 80);
    --color-danger: oklch(0.65 0.22 25);

    --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    background: var(--color-surface-0);
    color: var(--color-surface-800);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

::selection { background-color: var(--color-brand-500); color: white; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-surface-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-surface-400); }
code { font-family: var(--font-mono); }

/* ── Nav ─────────────────────────────────────── */
nav {
    background: var(--color-surface-50);
    border-bottom: 1px solid var(--color-surface-200);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    height: 3.5rem;
    gap: 1.5rem;
    flex-shrink: 0;
}

nav .logo {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-brand-400);
    letter-spacing: -0.02em;
}

nav .model-name {
    font-size: 0.75rem;
    color: var(--color-surface-400);
    font-family: var(--font-mono);
    background: var(--color-surface-100);
    padding: 0.2rem 0.5rem;
    border-radius: 0.25rem;
}

nav .nav-links { display: flex; gap: 1.5rem; margin-left: auto; }

nav a {
    color: var(--color-surface-500);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.5rem 0;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
}

nav a:hover { color: var(--color-surface-700); }
nav a.active {
    color: var(--color-brand-400);
    border-bottom-color: var(--color-brand-400);
}

nav .mem-info {
    font-size: 0.6875rem;
    color: var(--color-surface-400);
    font-family: var(--font-mono);
}

.view { display: none; flex: 1; overflow: hidden; }
.view.active { display: flex; flex-direction: column; }

/* ── Cluster Tree ───────────────────────────── */
#cluster { flex: 1; overflow: auto; }

#cluster-tree {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    min-height: 100%;
}

.model-root-card {
    background: var(--color-surface-50);
    border: 1px solid var(--color-surface-200);
    border-radius: 1rem;
    padding: 1rem 2rem;
    text-align: center;
}

.model-root-card .model-title {
    font-size: 1rem;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--color-surface-700);
}

.model-root-card .model-meta {
    font-size: 0.75rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    margin-top: 0.25rem;
}

.tree-connector {
    width: 2px;
    height: 1.5rem;
    background: var(--color-surface-300);
}

.tree-nodes {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.5rem;
    align-items: flex-start;
}

/* ── Node Card ──────────────────────────────── */
.node-card {
    background: var(--color-surface-50);
    border: 1px solid var(--color-surface-200);
    border-radius: 0.75rem;
    width: 360px;
    display: flex;
    flex-direction: column;
}

.node-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--color-surface-200);
}

.node-header .device-icon { flex-shrink: 0; }

.node-info { flex: 1; min-width: 0; }

.node-info .node-name {
    font-size: 0.9375rem;
    font-weight: 700;
    color: var(--color-surface-700);
}

.node-info .node-sub {
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.node-badge {
    font-size: 0.5625rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 0.2rem 0.5rem;
    border-radius: 9999px;
    color: white;
    flex-shrink: 0;
    text-transform: uppercase;
}

.node-badge.master { background: var(--color-brand-600); }
.node-badge.worker { background: var(--color-accent-600); }

/* VRAM bar */
.vram-section {
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--color-surface-200);
}

.vram-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-500);
    margin-bottom: 0.35rem;
}

.vram-bar {
    width: 100%;
    height: 6px;
    background: var(--color-surface-100);
    border-radius: 3px;
    overflow: hidden;
}

.vram-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
}

/* ── Model Group ────────────────────────────── */
.model-group-header {
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    padding: 0.5rem 1rem 0.25rem;
    letter-spacing: 0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* ── Layer Item ─────────────────────────────── */
.layer-item {
    border-bottom: 1px solid var(--color-surface-100);
}

.layer-item:last-child { border-bottom: none; }

.layer-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 1rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
}

.layer-header:hover { background: var(--color-surface-100); }

.layer-header .chevron {
    font-size: 0.5rem;
    color: var(--color-surface-400);
    transition: transform 0.15s;
    width: 0.75rem;
    text-align: center;
    flex-shrink: 0;
}

.layer-header .chevron.open { transform: rotate(90deg); }

.layer-header .layer-label {
    font-size: 0.8125rem;
    font-family: var(--font-mono);
    color: var(--color-surface-600);
    font-weight: 500;
}

.layer-header .layer-size {
    margin-left: auto;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    flex-shrink: 0;
}

/* ── Tensor List ────────────────────────────── */
.tensor-list {
    padding: 0 1rem 0.25rem 2rem;
    overflow: hidden;
    max-height: 2000px;
    transition: max-height 0.2s ease-out, padding 0.2s;
}

.tensor-list.collapsed {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
}

.tensor-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.2rem 0;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-500);
}

.tensor-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.tensor-meta {
    font-size: 0.625rem;
    color: var(--color-surface-400);
    white-space: nowrap;
    flex-shrink: 0;
}

.tensor-bar {
    width: 50px;
    height: 5px;
    background: var(--color-surface-100);
    border-radius: 2.5px;
    overflow: hidden;
    flex-shrink: 0;
}

.tensor-bar-fill {
    height: 100%;
    border-radius: 2.5px;
    background: var(--color-brand-500);
}

.tensor-pct {
    font-size: 0.5625rem;
    color: var(--color-surface-400);
    width: 2.5rem;
    text-align: right;
    flex-shrink: 0;
}

/* ── Chat View ───────────────────────────────── */
#chat {
    flex: 1;
    display: none;
    flex-direction: column;
    max-width: 56rem;
    width: 100%;
    margin: 0 auto;
    padding: 0 1.5rem;
}
#chat.active { display: flex; }

.messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1rem 0;
}

.message {
    display: flex;
    gap: 0.75rem;
    animation: fade-in 0.2s ease-out;
}

.message .avatar {
    width: 2rem;
    height: 2rem;
    border-radius: 0.5rem;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
}

.message.user .avatar { background: var(--color-brand-600); }
.message.assistant .avatar { background: var(--color-accent-600); }

.message .bubble {
    background: var(--color-surface-50);
    border: 1px solid var(--color-surface-200);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
    font-size: 0.9375rem;
    line-height: 1.6;
    color: var(--color-surface-800);
    max-width: 80%;
    overflow-wrap: break-word;
}

.message .bubble pre {
    background: var(--color-surface-100);
    border: 1px solid var(--color-surface-200);
    border-radius: 0.375rem;
    padding: 0.75rem;
    margin: 0.5rem 0;
    overflow-x: auto;
    font-size: 0.8125rem;
    line-height: 1.5;
}

.message .bubble code { font-size: 0.85em; }
.message .bubble p + p { margin-top: 0.5rem; }

.chat-footer {
    flex-shrink: 0;
    padding: 0.75rem 0 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.chat-stats {
    display: flex;
    gap: 1rem;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    min-height: 1rem;
}

.chat-input {
    display: flex;
    gap: 0.75rem;
}

.chat-input textarea {
    flex: 1;
    background: var(--color-surface-50);
    border: 1px solid var(--color-surface-300);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
    font-family: var(--font-sans);
    font-size: 0.9375rem;
    color: var(--color-surface-800);
    resize: none;
    outline: none;
    min-height: 2.75rem;
    max-height: 10rem;
    transition: border-color 0.15s;
}

.chat-input textarea:focus { border-color: var(--color-brand-400); }
.chat-input textarea::placeholder { color: var(--color-surface-400); }

.chat-input button {
    background: var(--color-brand-500);
    color: white;
    border: none;
    border-radius: 0.75rem;
    padding: 0 1.25rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
}

.chat-input button:hover { background: var(--color-brand-600); }
.chat-input button:disabled { background: var(--color-surface-300); cursor: not-allowed; }

.empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-surface-400);
    font-size: 0.9375rem;
}

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<nav>
    <span class="logo">cake</span>
    <span class="model-name" id="nav-model"></span>
    <span class="mem-info" id="nav-mem"></span>
    <div class="nav-links">
        <a href="#cluster" id="nav-cluster">Cluster</a>
        <a href="#chat" id="nav-chat">Chat</a>
    </div>
</nav>

<div id="cluster" class="view">
    <div id="cluster-tree"></div>
</div>

<div id="chat" class="view">
    <div class="messages" id="messages">
        <div class="empty-state" id="chat-empty">Send a message to start a conversation.</div>
    </div>
    <div class="chat-footer">
        <div class="chat-stats" id="chat-stats"></div>
        <div class="chat-input">
            <textarea id="chat-textarea" placeholder="Type a message..." rows="1"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ── Router ──────────────────────────────────
    const views = { cluster: document.getElementById('cluster'), chat: document.getElementById('chat') };
    const navLinks = { cluster: document.getElementById('nav-cluster'), chat: document.getElementById('nav-chat') };

    function route() {
        const hash = location.hash.replace('#', '') || 'cluster';
        Object.keys(views).forEach(k => {
            views[k].classList.toggle('active', k === hash);
            navLinks[k].classList.toggle('active', k === hash);
        });
        if (hash === 'cluster') loadTopology();
    }

    window.addEventListener('hashchange', route);
    route();

    // ── Helpers ─────────────────────────────────
    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function el(tag, cls) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
    }

    function humanBytes(b) {
        if (b === 0) return '0 B';
        const u = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
        const i = Math.floor(Math.log(b) / Math.log(1024));
        return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
    }

    function layerRange(layers) {
        if (!layers.length) return 'none';
        const nums = layers.map(l => parseInt(l.replace('model.layers.', ''))).sort((a, b) => a - b);
        if (nums.length === 1) return '' + nums[0];
        const ranges = [];
        let start = nums[0], end = nums[0];
        for (let i = 1; i < nums.length; i++) {
            if (nums[i] === end + 1) end = nums[i];
            else { ranges.push(start === end ? '' + start : start + '-' + end); start = end = nums[i]; }
        }
        ranges.push(start === end ? '' + start : start + '-' + end);
        return ranges.join(', ');
    }

    function inferDevice(desc) {
        if (!desc) return 'cpu';
        const d = desc.toLowerCase();
        if (d.includes('nvidia') || d.includes('geforce') || d.includes('titan') || d.includes('rtx') || d.includes('gtx') || d === 'cuda') return 'cuda';
        if (d.includes('apple') || d.includes('metal') || d.includes('silicon')) return 'metal';
        return 'cpu';
    }

    function osIconSVG(os, size) {
        const s = size || 16;
        let inner = '';
        const o = (os || '').toLowerCase();
        if (o === 'linux') {
            // Tux penguin (simplified)
            inner = '<path d="M0-8C-3-8-5-5-5-1C-5 2-4.5 4-3.5 6C-3 7-2 8-1 8.5L-1 9.5C-1 10 0 10 0 10C0 10 1 10 1 9.5L1 8.5C2 8 3 7 3.5 6C4.5 4 5 2 5-1C5-5 3-8 0-8Z" fill="#F5C518"/>'
                  + '<circle cx="-1.8" cy="-3.5" r="0.8" fill="#333"/>'
                  + '<circle cx="1.8" cy="-3.5" r="0.8" fill="#333"/>'
                  + '<ellipse cx="0" cy="-1" rx="1.2" ry="0.6" fill="#E8A500"/>'
                  + '<path d="M-2.5 1C-2.5 1-1.5 3 0 3C1.5 3 2.5 1 2.5 1" fill="none" stroke="#333" stroke-width="0.6"/>';
        } else if (o === 'macos') {
            // Apple logo
            inner = '<path d="M0-7.5C-1-7.5-2.3-6.8-3.1-5.9-1.4-5.9-.4-6.9 0-7.5Z'
                  + 'M3.5-4.5C3.3-4.3.8-2.8.8-.1.8 3.2 3.8 4.3 3.9 4.4 3.9 4.4 3.2 6.7 1.5 7.5'
                  + '-.2 7.5-1.2 7.5-2.2 7.1-2.9 7.1-3.7 7.1-4.6 7.5-5.2 7.5-7-4.6-8.3-4.6-6.6'
                  + '-8.3-5.5-8.3-4.4-7.4-.5-7.4.2-7.4.9-7.8 1.2-8 1.6-8.1 2.3-8.2 3.5-4.5Z" fill="#A2AAAD"/>';
        } else if (o === 'windows') {
            // Windows logo
            inner = '<rect x="-8" y="-8" width="7.5" height="7.5" rx="0.5" fill="#0078D4"/>'
                  + '<rect x="0.5" y="-8" width="7.5" height="7.5" rx="0.5" fill="#0078D4"/>'
                  + '<rect x="-8" y="0.5" width="7.5" height="7.5" rx="0.5" fill="#0078D4"/>'
                  + '<rect x="0.5" y="0.5" width="7.5" height="7.5" rx="0.5" fill="#0078D4"/>';
        } else {
            // Generic server icon
            inner = '<rect x="-7" y="-8" width="14" height="6" rx="1.5" fill="none" stroke="#7C8DB0" stroke-width="1.2"/>'
                  + '<circle cx="4" cy="-5" r="1" fill="#7C8DB0"/>'
                  + '<rect x="-7" y="1" width="14" height="6" rx="1.5" fill="none" stroke="#7C8DB0" stroke-width="1.2"/>'
                  + '<circle cx="4" cy="4" r="1" fill="#7C8DB0"/>';
        }
        return '<svg width="'+s+'" height="'+s+'" viewBox="-10 -10 20 20" style="vertical-align:middle">'+inner+'</svg>';
    }

    function deviceIconSVG(device, size) {
        const s = size || 48;
        let inner = '';
        if (device === 'cuda') {
            // NVIDIA stylized GPU icon
            inner = '<rect x="-10" y="-7" width="20" height="14" rx="2" fill="none" stroke="#76B900" stroke-width="1.5"/>'
                  + '<rect x="-7" y="-4.5" width="5" height="4" rx="0.5" fill="#76B900"/>'
                  + '<rect x="-7" y="1" width="5" height="4" rx="0.5" fill="#76B900"/>'
                  + '<rect x="0" y="-4.5" width="5" height="9.5" rx="0.5" fill="#76B900"/>'
                  + '<line x1="-10" y1="-9" x2="-10" y2="-7" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="-6" y1="-9" x2="-6" y2="-7" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="-2" y1="-9" x2="-2" y2="-7" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="2" y1="-9" x2="2" y2="-7" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="6" y1="-9" x2="6" y2="-7" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="10" y1="-9" x2="10" y2="-7" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="-10" y1="7" x2="-10" y2="9" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="-6" y1="7" x2="-6" y2="9" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="-2" y1="7" x2="-2" y2="9" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="2" y1="7" x2="2" y2="9" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="6" y1="7" x2="6" y2="9" stroke="#76B900" stroke-width="1.2"/>'
                  + '<line x1="10" y1="7" x2="10" y2="9" stroke="#76B900" stroke-width="1.2"/>';
        } else if (device === 'metal') {
            // Apple logo
            inner = '<path d="M0-9C-1.2-9-2.8-8.2-3.7-7.1-1.7-7.1-.5-8.3 0-9Z'
                  + 'M4.2-5.4C4-5.2 1-3.4 1-.1 1 3.8 4.6 5.2 4.7 5.3 4.7 5.3 3.8 8.1 1.8 9'
                  + '-0.2 9.1-1.4 9.1-2.6 8.5-3.5 8.5-4.5 8.5-5.5 9.1-6.2 9.1-8.4 9-10-5.5-10-3.1'
                  + '-10-1.7-8.9-.6-8.9.3-8.9 1.1-9.4 1.5-9.6 1.9-9.7 2.8-9.9 4.2-5.4Z" fill="#A2AAAD"/>';
        } else {
            // CPU chip
            inner = '<rect x="-7" y="-7" width="14" height="14" rx="2.5" fill="none" stroke="#7C8DB0" stroke-width="1.5"/>'
                  + '<rect x="-4" y="-4" width="8" height="8" rx="1.5" fill="#7C8DB0"/>';
            [-4, 0, 4].forEach(p => {
                inner += '<line x1="'+p+'" y1="-7" x2="'+p+'" y2="-10" stroke="#7C8DB0" stroke-width="1.3"/>'
                       + '<line x1="'+p+'" y1="7" x2="'+p+'" y2="10" stroke="#7C8DB0" stroke-width="1.3"/>'
                       + '<line x1="-7" y1="'+p+'" x2="-10" y2="'+p+'" stroke="#7C8DB0" stroke-width="1.3"/>'
                       + '<line x1="7" y1="'+p+'" x2="10" y2="'+p+'" stroke="#7C8DB0" stroke-width="1.3"/>';
            });
        }
        return '<svg class="device-icon" width="'+s+'" height="'+s+'" viewBox="-12 -12 24 24">'+inner+'</svg>';
    }

    // ── Cluster Tree ────────────────────────────
    let expandedLayers = new Set();

    async function loadTopology() {
        try {
            const resp = await fetch('/api/v1/topology');
            if (!resp.ok) return;
            const data = await resp.json();
            document.getElementById('nav-model').textContent = data.model;
            document.getElementById('nav-mem').textContent = humanBytes(data.memory_bytes);
            renderGraph(data);
        } catch (e) {
            console.error('topology fetch failed:', e);
        }
    }

    function renderGraph(data) {
        const tree = document.getElementById('cluster-tree');

        // Save expand state before re-render (collapsed by default)
        tree.querySelectorAll('.layer-item').forEach(item => {
            const tl = item.querySelector('.tensor-list');
            const name = item.dataset.layer;
            if (name && tl && !tl.classList.contains('collapsed')) {
                expandedLayers.add(name);
            } else if (name) {
                expandedLayers.delete(name);
            }
        });

        tree.innerHTML = '';
        const layerBytes = data.layer_size_bytes || 0;
        const totalModelGB = (layerBytes * data.num_layers / (1024*1024*1024)).toFixed(1);

        // ── Model root card ──
        const mc = el('div', 'model-root-card');
        mc.innerHTML = '<div class="model-title">' + esc(data.model) + '</div>'
            + '<div class="model-meta">' + data.num_layers + ' layers &middot; '
            + esc(data.dtype) + ' &middot; ' + totalModelGB + ' GiB</div>';
        tree.appendChild(mc);
        tree.appendChild(el('div', 'tree-connector'));

        // ── Build all nodes ──
        const allNodes = [{
            id: 'master', label: 'master', device: inferDevice(data.master.device),
            layers: data.master.layers, isMaster: true,
            vram: data.master.vram_bytes || 0, tflops: data.master.tflops || 0,
            sub: data.master.device,
            hostname: data.master.hostname || '',
            os: data.master.os || ''
        }];
        data.workers.forEach(w => {
            allNodes.push({
                id: w.name, label: w.name, device: inferDevice(w.description || w.host),
                layers: w.layers, isMaster: false,
                vram: w.vram_bytes || 0, tflops: w.tflops || 0,
                sub: w.description || w.host,
                hostname: w.hostname || '',
                os: w.os || ''
            });
        });

        // Sort nodes by minimum layer index so the model reads left-to-right
        function minLayerIdx(layers) {
            if (!layers.length) return Infinity;
            return Math.min(...layers.map(l => parseInt(l.replace('model.layers.', '')) || 0));
        }
        allNodes.sort((a, b) => minLayerIdx(a.layers) - minLayerIdx(b.layers));

        const nodesContainer = el('div', 'tree-nodes');
        allNodes.forEach(node => {
            nodesContainer.appendChild(buildNodeCard(node, data));
        });
        tree.appendChild(nodesContainer);
    }

    function buildNodeCard(node, data) {
        const card = el('div', 'node-card');
        const layerBytes = data.layer_size_bytes || 0;
        const usedBytes = node.layers.length * layerBytes;
        const usageRatio = node.vram > 0 ? Math.min(usedBytes / node.vram, 1.0) : 0;
        const nodeGB = (usedBytes / (1024*1024*1024)).toFixed(1);
        const totalGB = (node.vram / (1024*1024*1024)).toFixed(1);
        const pct = (usageRatio * 100).toFixed(0);
        const barColor = usageRatio > 0.85 ? 'var(--color-danger)'
            : (node.isMaster ? 'var(--color-brand-500)' : 'var(--color-accent-500)');

        // Header
        const header = el('div', 'node-header');
        const hostLine = node.hostname ? node.hostname : '';
        const subLine = node.sub + (hostLine ? ' &middot; ' + esc(hostLine) : '');
        const osIcon = node.os ? osIconSVG(node.os, 14) + ' ' : '';
        header.innerHTML = deviceIconSVG(node.device, 42)
            + '<div class="node-info">'
            + '<div class="node-name">' + esc(node.label) + '</div>'
            + '<div class="node-sub">' + osIcon + subLine + '</div>'
            + '</div>'
            + '<span class="node-badge ' + (node.isMaster ? 'master' : 'worker') + '">'
            + (node.isMaster ? 'Master' : 'Worker') + '</span>';
        card.appendChild(header);

        // VRAM bar + TFLOPS
        const tflopsStr = node.tflops > 0 ? '~' + node.tflops.toFixed(1) + ' TFLOPS' : '';
        const vs = el('div', 'vram-section');
        vs.innerHTML = '<div class="vram-label"><span>' + nodeGB + ' / ' + totalGB + ' GiB</span><span>' + tflopsStr + '</span></div>'
            + '<div class="vram-bar"><div class="vram-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>';
        card.appendChild(vs);

        // Model group
        const mgh = el('div', 'model-group-header');
        mgh.textContent = data.model;
        card.appendChild(mgh);

        // Layers
        const sortedLayers = [...node.layers].sort((a, b) => {
            return parseInt(a.replace('model.layers.', '')) - parseInt(b.replace('model.layers.', ''));
        });

        sortedLayers.forEach(layerName => {
            const detail = data.layer_details ? data.layer_details[layerName] : null;
            card.appendChild(buildLayerItem(layerName, detail, node));
        });

        return card;
    }

    function buildLayerItem(layerName, detail, node) {
        const item = el('div', 'layer-item');
        item.dataset.layer = layerName;
        const layerNum = layerName.replace('model.layers.', '');
        const totalBytes = detail ? detail.total_bytes : 0;
        const isExpanded = expandedLayers.has(layerName);

        // Header
        const header = el('div', 'layer-header');
        const chevron = el('span', 'chevron' + (isExpanded ? ' open' : ''));
        chevron.innerHTML = '&#9654;';
        const label = el('span', 'layer-label');
        label.textContent = 'Layer ' + layerNum;
        const size = el('span', 'layer-size');
        size.textContent = humanBytes(totalBytes);

        header.appendChild(chevron);
        header.appendChild(label);
        header.appendChild(size);

        // Tensor list (collapsed by default)
        const tensorList = el('div', 'tensor-list' + (isExpanded ? '' : ' collapsed'));
        const barColor = node.isMaster ? 'var(--color-brand-500)' : 'var(--color-accent-500)';

        if (detail && detail.tensors) {
            // Find the largest tensor in this layer for proportional bars
            const maxBytes = Math.max(...detail.tensors.map(t => t.size_bytes), 1);

            detail.tensors.forEach(t => {
                const pctOfLayer = totalBytes > 0 ? (t.size_bytes / totalBytes * 100).toFixed(1) : '0.0';
                const barPct = (t.size_bytes / maxBytes * 100).toFixed(1);

                const row = el('div', 'tensor-row');
                const name = el('span', 'tensor-name');
                name.textContent = t.short_name;
                name.title = t.dtype + ' [' + t.shape.join(', ') + '] — ' + t.name;

                const sz = el('span', 'tensor-meta');
                sz.textContent = humanBytes(t.size_bytes);

                const bar = el('div', 'tensor-bar');
                bar.innerHTML = '<div class="tensor-bar-fill" style="width:' + barPct + '%;background:' + barColor + '"></div>';

                const pctEl = el('span', 'tensor-pct');
                pctEl.textContent = pctOfLayer + '%';

                row.appendChild(name);
                row.appendChild(sz);
                row.appendChild(bar);
                row.appendChild(pctEl);
                tensorList.appendChild(row);
            });
        }

        header.addEventListener('click', () => {
            tensorList.classList.toggle('collapsed');
            chevron.classList.toggle('open');
        });

        item.appendChild(header);
        item.appendChild(tensorList);
        return item;
    }

    // Auto-refresh topology every 10s
    setInterval(() => {
        if (location.hash === '#cluster' || !location.hash) loadTopology();
    }, 10000);

    // ── Chat View ───────────────────────────────
    const messagesEl = document.getElementById('messages');
    const emptyEl = document.getElementById('chat-empty');
    const textarea = document.getElementById('chat-textarea');
    const sendBtn = document.getElementById('send-btn');
    const statsEl = document.getElementById('chat-stats');
    let chatHistory = [];
    let generating = false;

    textarea.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);

    async function sendMessage() {
        const text = textarea.value.trim();
        if (!text || generating) return;

        emptyEl.style.display = 'none';
        generating = true;
        sendBtn.disabled = true;
        textarea.value = '';
        textarea.style.height = 'auto';
        statsEl.textContent = '';

        chatHistory.push({ role: 'user', content: text });
        appendMessage('user', text);

        const { bubble } = appendMessage('assistant', '');
        let fullContent = '';
        let tokenCount = 0;
        let firstTokenTime = null;
        let lastTokenTime = null;

        try {
            const resp = await fetch('/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatHistory, stream: true, max_tokens: 4096 }),
            });

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const payload = line.slice(6).trim();
                    if (payload === '[DONE]') continue;
                    try {
                        const chunk = JSON.parse(payload);
                        const delta = chunk.choices?.[0]?.delta;
                        if (delta?.content) {
                            const now = performance.now();
                            if (firstTokenTime === null) firstTokenTime = now;
                            lastTokenTime = now;
                            tokenCount++;
                            fullContent += delta.content;
                            bubble.innerHTML = renderMarkdown(fullContent);
                            messagesEl.scrollTop = messagesEl.scrollHeight;

                            if (tokenCount > 1) {
                                const elapsed = (lastTokenTime - firstTokenTime) / 1000;
                                const tps = ((tokenCount - 1) / elapsed).toFixed(1);
                                statsEl.textContent = tokenCount + ' tokens \u00b7 ' + tps + ' tok/s';
                            }
                        }
                    } catch {}
                }
            }

            chatHistory.push({ role: 'assistant', content: fullContent });

            if (tokenCount > 1 && firstTokenTime !== null) {
                const elapsed = (lastTokenTime - firstTokenTime) / 1000;
                const tps = ((tokenCount - 1) / elapsed).toFixed(1);
                statsEl.textContent = tokenCount + ' tokens \u00b7 ' + tps + ' tok/s \u00b7 ' + elapsed.toFixed(1) + 's';
            }
        } catch (e) {
            bubble.innerHTML = '<span style="color:var(--color-danger)">Error: ' + esc(e.message) + '</span>';
        }

        generating = false;
        sendBtn.disabled = false;
        textarea.focus();
    }

    function appendMessage(role, content) {
        const msg = document.createElement('div');
        msg.className = 'message ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? 'U' : 'AI';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = content ? renderMarkdown(content) : '';

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return { msg, bubble };
    }

    function renderMarkdown(text) {
        let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => '<pre><code>' + code + '</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\n\n/g, '</p><p>');
        html = html.replace(/\n/g, '<br>');
        return '<p>' + html + '</p>';
    }
})();
</script>
