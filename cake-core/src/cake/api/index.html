<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cake</title>
<style>
:root {
    --color-brand-50: oklch(0.97 0.02 280);
    --color-brand-100: oklch(0.93 0.04 280);
    --color-brand-200: oklch(0.87 0.07 280);
    --color-brand-300: oklch(0.78 0.12 280);
    --color-brand-400: oklch(0.68 0.17 275);
    --color-brand-500: oklch(0.58 0.22 270);
    --color-brand-600: oklch(0.50 0.22 270);
    --color-brand-700: oklch(0.43 0.19 270);
    --color-brand-800: oklch(0.36 0.15 270);
    --color-brand-900: oklch(0.28 0.11 270);
    --color-brand-950: oklch(0.20 0.08 270);

    --color-surface-0: oklch(0.13 0.01 270);
    --color-surface-50: oklch(0.16 0.01 270);
    --color-surface-100: oklch(0.19 0.01 270);
    --color-surface-200: oklch(0.23 0.015 270);
    --color-surface-300: oklch(0.30 0.015 270);
    --color-surface-400: oklch(0.40 0.015 270);
    --color-surface-500: oklch(0.55 0.01 270);
    --color-surface-600: oklch(0.70 0.01 270);
    --color-surface-700: oklch(0.82 0.005 270);
    --color-surface-800: oklch(0.90 0.005 270);
    --color-surface-900: oklch(0.95 0.005 270);
    --color-surface-950: oklch(0.98 0.002 270);

    --color-accent-400: oklch(0.75 0.18 165);
    --color-accent-500: oklch(0.68 0.19 165);
    --color-accent-600: oklch(0.60 0.17 165);

    --color-success: oklch(0.72 0.19 145);
    --color-warning: oklch(0.80 0.18 80);
    --color-danger: oklch(0.65 0.22 25);

    --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    background: var(--color-surface-0);
    color: var(--color-surface-800);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

::selection { background-color: var(--color-brand-500); color: white; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-surface-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-surface-400); }
code { font-family: var(--font-mono); }

/* ── Nav ─────────────────────────────────────── */
nav {
    background: var(--color-surface-50);
    border-bottom: 1px solid var(--color-surface-200);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    height: 3.5rem;
    gap: 1.5rem;
    flex-shrink: 0;
}

nav .logo {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-brand-400);
    letter-spacing: -0.02em;
}

nav .model-name {
    font-size: 0.75rem;
    color: var(--color-surface-400);
    font-family: var(--font-mono);
    background: var(--color-surface-100);
    padding: 0.2rem 0.5rem;
    border-radius: 0.25rem;
    max-width: 24rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

nav .nav-links { display: flex; gap: 1.5rem; margin-left: auto; }

nav a {
    color: var(--color-surface-500);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.5rem 0;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
}

nav a:hover { color: var(--color-surface-700); }
nav a.active {
    color: var(--color-brand-400);
    border-bottom-color: var(--color-brand-400);
}

nav .mem-info {
    font-size: 0.6875rem;
    color: var(--color-surface-400);
    font-family: var(--font-mono);
}

.view { display: none; flex: 1; overflow: hidden; }
.view.active { display: flex; flex-direction: column; }

/* ── Cluster Chain ─────────────────────────────── */
#cluster { flex: 1; overflow: auto; }

#cluster-tree {
    padding: 2rem;
    display: flex;
    align-items: flex-start;
    gap: 0;
    min-height: 100%;
    overflow-x: auto;
    justify-content: center;
}

.chain-endpoint {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--color-surface-400);
    flex-shrink: 0;
    margin-top: 25px;
}

.chain-link {
    flex-shrink: 0;
    margin-top: 22px;
    color: var(--color-surface-300);
    display: flex;
    align-items: center;
}

/* ── Node Card ──────────────────────────────── */
.node-card {
    background: var(--color-surface-50);
    border: 1px solid var(--color-surface-200);
    border-radius: 0.75rem;
    width: 360px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}

.node-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--color-surface-200);
}

.node-header .device-icon { flex-shrink: 0; }

.node-info { flex: 1; min-width: 0; }

.node-info .node-name {
    font-size: 0.9375rem;
    font-weight: 700;
    color: var(--color-surface-700);
}

.node-info .node-sub {
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.35rem;
}

.node-badge {
    font-size: 0.5625rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 0.2rem 0.5rem;
    border-radius: 9999px;
    color: white;
    flex-shrink: 0;
    text-transform: uppercase;
}

.node-badge.master { background: var(--color-brand-600); }
.node-badge.worker { background: var(--color-accent-600); }

/* VRAM bar */
.vram-section {
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--color-surface-200);
}

.vram-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-500);
    margin-bottom: 0.35rem;
}

.vram-bar {
    width: 100%;
    height: 6px;
    background: var(--color-surface-100);
    border-radius: 3px;
    overflow: hidden;
}

.vram-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
}

/* ── Model Group (expandable) ──────────────── */
.model-group {}

.model-group-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
}

.model-group-header:hover { background: var(--color-surface-100); }

.model-group-header .chevron {
    font-size: 0.5rem;
    color: var(--color-surface-400);
    transition: transform 0.15s;
    width: 0.75rem;
    text-align: center;
    flex-shrink: 0;
}

.model-group-header .chevron.open { transform: rotate(90deg); }

.model-group-name {
    font-size: 0.6875rem;
    font-weight: 600;
    font-family: var(--font-mono);
    color: var(--color-surface-600);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
}

.model-ratio {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
}

.model-ratio-bar {
    width: 48px;
    height: 5px;
    background: var(--color-surface-100);
    border-radius: 2.5px;
    overflow: hidden;
}

.model-ratio-fill {
    height: 100%;
    border-radius: 2.5px;
}

.model-ratio-text {
    font-size: 0.625rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    white-space: nowrap;
}

.model-group-content {
    overflow: hidden;
    max-height: 5000px;
    transition: max-height 0.3s ease-out;
}

.model-group-content.collapsed {
    max-height: 0;
}

/* ── Layer Item ─────────────────────────────── */
.layer-item {
    border-bottom: 1px solid var(--color-surface-100);
}

.layer-item:last-child { border-bottom: none; }

.layer-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.35rem 1rem 0.35rem 1.75rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
}

.layer-header:hover { background: var(--color-surface-100); }

.layer-header .chevron {
    font-size: 0.4375rem;
    color: var(--color-surface-400);
    transition: transform 0.15s;
    width: 0.625rem;
    text-align: center;
    flex-shrink: 0;
}

.layer-header .chevron.open { transform: rotate(90deg); }

.layer-header .layer-label {
    font-size: 0.625rem;
    font-family: var(--font-mono);
    color: var(--color-surface-500);
    font-weight: 500;
}

.layer-header .layer-size {
    margin-left: auto;
    font-size: 0.5625rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    flex-shrink: 0;
}

/* ── Tensor List ────────────────────────────── */
.tensor-list {
    padding: 0 1rem 0.25rem 2.75rem;
    overflow: hidden;
    max-height: 2000px;
    transition: max-height 0.2s ease-out, padding 0.2s;
}

.tensor-list.collapsed {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
}

.tensor-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.2rem 0;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-500);
}

.tensor-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.tensor-meta {
    font-size: 0.625rem;
    color: var(--color-surface-400);
    white-space: nowrap;
    flex-shrink: 0;
}

.tensor-bar {
    width: 50px;
    height: 5px;
    background: var(--color-surface-100);
    border-radius: 2.5px;
    overflow: hidden;
    flex-shrink: 0;
}

.tensor-bar-fill {
    height: 100%;
    border-radius: 2.5px;
    background: var(--color-brand-500);
}

.tensor-pct {
    font-size: 0.5625rem;
    color: var(--color-surface-400);
    width: 2.5rem;
    text-align: right;
    flex-shrink: 0;
}

/* ── Chat View ───────────────────────────────── */
#chat {
    flex: 1;
    display: none;
    flex-direction: column;
    max-width: 56rem;
    width: 100%;
    margin: 0 auto;
    padding: 0 1.5rem;
}
#chat.active { display: flex; }

.messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1rem 0;
}

.message {
    display: flex;
    gap: 0.75rem;
    animation: fade-in 0.2s ease-out;
}

.message .avatar {
    width: 2rem;
    height: 2rem;
    border-radius: 0.5rem;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
}

.message.user .avatar { background: var(--color-brand-600); }
.message.assistant .avatar { background: var(--color-accent-600); }

.message .bubble {
    background: var(--color-surface-50);
    border: 1px solid var(--color-surface-200);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
    font-size: 0.9375rem;
    line-height: 1.6;
    color: var(--color-surface-800);
    max-width: 80%;
    overflow-wrap: break-word;
}

.message .bubble pre {
    background: var(--color-surface-100);
    border: 1px solid var(--color-surface-200);
    border-radius: 0.375rem;
    padding: 0.75rem;
    margin: 0.5rem 0;
    overflow-x: auto;
    font-size: 0.8125rem;
    line-height: 1.5;
}

.message .bubble code { font-size: 0.85em; }
.message .bubble p + p { margin-top: 0.5rem; }

.chat-footer {
    flex-shrink: 0;
    padding: 0.75rem 0 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.chat-stats {
    display: flex;
    gap: 1rem;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    color: var(--color-surface-400);
    min-height: 1rem;
}

.chat-input {
    display: flex;
    gap: 0.75rem;
}

.chat-input textarea {
    flex: 1;
    background: var(--color-surface-50);
    border: 1px solid var(--color-surface-300);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
    font-family: var(--font-sans);
    font-size: 0.9375rem;
    color: var(--color-surface-800);
    resize: none;
    outline: none;
    min-height: 2.75rem;
    max-height: 10rem;
    transition: border-color 0.15s;
}

.chat-input textarea:focus { border-color: var(--color-brand-400); }
.chat-input textarea::placeholder { color: var(--color-surface-400); }

.chat-input button {
    background: var(--color-brand-500);
    color: white;
    border: none;
    border-radius: 0.75rem;
    padding: 0 1.25rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
}

.chat-input button:hover { background: var(--color-brand-600); }
.chat-input button:disabled { background: var(--color-surface-300); cursor: not-allowed; }

.empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-surface-400);
    font-size: 0.9375rem;
}

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<nav>
    <span class="logo">cake</span>
    <span class="model-name" id="nav-model"></span>
    <span class="mem-info" id="nav-mem"></span>
    <div class="nav-links">
        <a href="#cluster" id="nav-cluster">Cluster</a>
        <a href="#chat" id="nav-chat">Chat</a>
    </div>
</nav>

<div id="cluster" class="view">
    <div id="cluster-tree"></div>
</div>

<div id="chat" class="view">
    <div class="messages" id="messages">
        <div class="empty-state" id="chat-empty">Send a message to start a conversation.</div>
    </div>
    <div class="chat-footer">
        <div class="chat-stats" id="chat-stats"></div>
        <div class="chat-input">
            <textarea id="chat-textarea" placeholder="Type a message..." rows="1"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ── Router ──────────────────────────────────
    const views = { cluster: document.getElementById('cluster'), chat: document.getElementById('chat') };
    const navLinks = { cluster: document.getElementById('nav-cluster'), chat: document.getElementById('nav-chat') };

    function route() {
        const hash = location.hash.replace('#', '') || 'cluster';
        Object.keys(views).forEach(k => {
            views[k].classList.toggle('active', k === hash);
            navLinks[k].classList.toggle('active', k === hash);
        });
        if (hash === 'cluster') loadTopology();
    }

    window.addEventListener('hashchange', route);
    route();

    // ── Helpers ─────────────────────────────────
    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function el(tag, cls) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
    }

    function humanBytes(b) {
        if (b === 0) return '0 B';
        const u = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
        const i = Math.floor(Math.log(b) / Math.log(1024));
        return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
    }

    function inferDevice(desc) {
        if (!desc) return 'cpu';
        const d = desc.toLowerCase();
        if (d.includes('nvidia') || d.includes('geforce') || d.includes('titan') || d.includes('rtx') || d.includes('gtx') || d === 'cuda') return 'cuda';
        if (d.includes('apple') || d.includes('metal') || d.includes('silicon')) return 'metal';
        return 'cpu';
    }

        apple: 'M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701',
        windows: 'M0,0H11.377V11.372H0ZM12.623,0H24V11.372H12.623ZM0,12.623H11.377V24H0Zm12.623,0H24V24H12.623',
        linux: 'M12.504 0c-.155 0-.315.008-.48.021-4.226.333-3.105 4.807-3.17 6.298-.076 1.092-.3 1.953-1.05 3.02-.885 1.051-2.127 2.75-2.716 4.521-.278.832-.41 1.684-.287 2.489a.424.424 0 00-.11.135c-.26.268-.45.6-.663.839-.199.199-.485.267-.797.4-.313.136-.658.269-.864.68-.09.189-.136.394-.132.602 0 .199.027.4.055.536.058.399.116.728.04.97-.249.68-.28 1.145-.106 1.484.174.334.535.47.94.601.81.2 1.91.135 2.774.6.926.466 1.866.67 2.616.47.526-.116.97-.464 1.208-.946.587-.003 1.23-.269 2.26-.334.699-.058 1.574.267 2.577.2.025.134.063.198.114.333l.003.003c.391.778 1.113 1.132 1.884 1.071.771-.06 1.592-.536 2.257-1.306.631-.765 1.683-1.084 2.378-1.503.348-.199.629-.469.649-.853.023-.4-.2-.811-.714-1.376v-.097l-.003-.003c-.17-.2-.25-.535-.338-.926-.085-.401-.182-.786-.492-1.046h-.003c-.059-.054-.123-.067-.188-.135a.357.357 0 00-.19-.064c.431-1.278.264-2.55-.173-3.694-.533-1.41-1.465-2.638-2.175-3.483-.796-1.005-1.576-1.957-1.56-3.368.026-2.152.236-6.133-3.544-6.139z'

    function deviceIconSVG(device, size) {
        const s = size || 36;
        let path = '', color = '#7C8DB0', vb = '0 0 24 24';
        if (device === 'cuda') {
            path = SVG_PATHS.nvidia;
            color = '#76B900';
        } else if (device === 'metal') {
            path = SVG_PATHS.apple;
            color = '#cccccc';
        } else {
            // CPU chip (Bootstrap Icons)
            vb = '0 0 16 16';
            path = 'M5 0a.5.5 0 0 1 .5.5V2h1V.5a.5.5 0 0 1 1 0V2h1V.5a.5.5 0 0 1 1 0V2h1V.5a.5.5 0 0 1 1 0V2A2.5 2.5 0 0 1 14 4.5h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14a2.5 2.5 0 0 1-2.5 2.5v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14A2.5 2.5 0 0 1 2 11.5H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2A2.5 2.5 0 0 1 4.5 2V.5A.5.5 0 0 1 5 0m-.5 3A1.5 1.5 0 0 0 3 4.5v7A1.5 1.5 0 0 0 4.5 13h7a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 11.5 3zM5 6.5A1.5 1.5 0 0 1 6.5 5h3A1.5 1.5 0 0 1 11 6.5v3A1.5 1.5 0 0 1 9.5 11h-3A1.5 1.5 0 0 1 5 9.5zM6.5 6a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5z';
            color = '#7C8DB0';
        }
        return '<svg class="device-icon" width="'+s+'" height="'+s+'" viewBox="'+vb+'"><path d="'+path+'" fill="'+color+'"/></svg>';
    }

    function osIconSVG(os, size) {
        const s = size || 14;
        const o = (os || '').toLowerCase();
        let path = '', color = '#A2AAAD', vb = '0 0 24 24';
        if (o === 'linux') {
            path = SVG_PATHS.linux;
            color = '#FCC624';
        } else if (o === 'macos') {
            path = SVG_PATHS.apple;
            color = '#cccccc';
        } else if (o === 'windows') {
            path = SVG_PATHS.windows;
            color = '#0078D4';
        } else {
            return '';
        }
        return '<svg width="'+s+'" height="'+s+'" viewBox="'+vb+'" style="vertical-align:middle;flex-shrink:0"><path d="'+path+'" fill="'+color+'"/></svg>';
    }

    // ── Chain helpers ────────────────────────────
    function chainDot() {
        return el('div', 'chain-endpoint');
    }

    function chainArrow() {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('class', 'chain-link');
        svg.setAttribute('width', '36');
        svg.setAttribute('height', '12');
        svg.setAttribute('viewBox', '0 0 36 12');
        svg.innerHTML = '<line x1="0" y1="6" x2="28" y2="6" stroke="currentColor" stroke-width="1.5"/>'
            + '<polygon points="28,1.5 36,6 28,10.5" fill="currentColor"/>';
        return svg;
    }

    // ── Cluster Graph ───────────────────────────
    let expandedModels = new Set();
    let expandedLayers = new Set();

    async function loadTopology() {
        try {
            const resp = await fetch('/api/v1/topology');
            if (!resp.ok) return;
            const data = await resp.json();
            const modelId = data.model_id || data.model;
            document.getElementById('nav-model').textContent = modelId;
            const totalGB = ((data.layer_size_bytes || 0) * data.num_layers / (1024*1024*1024)).toFixed(1);
            document.getElementById('nav-mem').textContent = data.num_layers + ' layers \u00b7 ' + data.dtype + ' \u00b7 ' + totalGB + ' GiB';
            renderGraph(data);
        } catch (e) {
            console.error('topology fetch failed:', e);
        }
    }

    function renderGraph(data) {
        const tree = document.getElementById('cluster-tree');

        // Save expand state before re-render
        tree.querySelectorAll('.model-group').forEach(mg => {
            const content = mg.querySelector('.model-group-content');
            const nodeId = mg.dataset.nodeId;
            if (nodeId && content && !content.classList.contains('collapsed')) {
                expandedModels.add(nodeId);
            } else if (nodeId) {
                expandedModels.delete(nodeId);
            }
        });
        tree.querySelectorAll('.layer-item').forEach(item => {
            const tl = item.querySelector('.tensor-list');
            const name = item.dataset.layer;
            if (name && tl && !tl.classList.contains('collapsed')) {
                expandedLayers.add(name);
            } else if (name) {
                expandedLayers.delete(name);
            }
        });

        tree.innerHTML = '';

        // ── Build all nodes ──
        const allNodes = [{
            id: 'master', label: 'master', device: inferDevice(data.master.device),
            layers: data.master.layers, isMaster: true,
            vram: data.master.vram_bytes || 0, tflops: data.master.tflops || 0,
            sub: data.master.backend || data.master.device,
            hostname: data.master.hostname || '',
            os: data.master.os || ''
        }];
        data.workers.forEach(w => {
            allNodes.push({
                id: w.name, label: w.name, device: inferDevice(w.description || w.host),
                layers: w.layers, isMaster: false,
                vram: w.vram_bytes || 0, tflops: w.tflops || 0,
                sub: w.backend || w.description || w.host,
                hostname: w.hostname || '',
                os: w.os || ''
            });
        });

        // Sort nodes by minimum layer index so the model reads left-to-right
        function minLayerIdx(layers) {
            if (!layers.length) return Infinity;
            return Math.min(...layers.map(l => parseInt(l.replace('model.layers.', '')) || 0));
        }
        allNodes.sort((a, b) => minLayerIdx(a.layers) - minLayerIdx(b.layers));

        // ── Build chain: ● → [Node] → [Node] → ... → ● ──
        tree.appendChild(chainDot());
        allNodes.forEach(node => {
            tree.appendChild(chainArrow());
            tree.appendChild(buildNodeCard(node, data));
        });
        tree.appendChild(chainArrow());
        tree.appendChild(chainDot());
    }

    function buildNodeCard(node, data) {
        const card = el('div', 'node-card');
        const layerBytes = data.layer_size_bytes || 0;
        const usedBytes = node.layers.length * layerBytes;
        const usageRatio = node.vram > 0 ? Math.min(usedBytes / node.vram, 1.0) : 0;
        const nodeGB = (usedBytes / (1024*1024*1024)).toFixed(1);
        const totalGB = (node.vram / (1024*1024*1024)).toFixed(1);
        const pct = (usageRatio * 100).toFixed(0);
        const barColor = node.isMaster ? 'var(--color-brand-500)' : 'var(--color-accent-500)';

        // Header
        const header = el('div', 'node-header');
        const hostLine = node.hostname ? node.hostname : '';
        const subText = node.sub + (hostLine ? ' \u00b7 ' + esc(hostLine) : '');
        const osIcon = node.os ? osIconSVG(node.os, 13) : '';
        header.innerHTML = deviceIconSVG(node.device, 36)
            + '<div class="node-info">'
            + '<div class="node-name">' + esc(node.label) + '</div>'
            + '<div class="node-sub">' + osIcon + '<span>' + subText + '</span></div>'
            + '</div>'
            + '<span class="node-badge ' + (node.isMaster ? 'master' : 'worker') + '">'
            + (node.isMaster ? 'Master' : 'Worker') + '</span>';
        card.appendChild(header);

        // VRAM bar + TFLOPS
        const tflopsStr = node.tflops > 0 ? '~' + node.tflops.toFixed(1) + ' TFLOPS' : '';
        const vs = el('div', 'vram-section');
        vs.innerHTML = '<div class="vram-label"><span>' + nodeGB + ' / ' + totalGB + ' GiB</span><span>' + tflopsStr + '</span></div>'
            + '<div class="vram-bar"><div class="vram-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>';
        card.appendChild(vs);

        // Model group (expandable)
        const modelId = data.model_id || data.model;
        const numLayersTotal = data.num_layers;
        const numLayersNode = node.layers.length;
        const modelRatio = numLayersTotal > 0 ? numLayersNode / numLayersTotal : 0;
        const isModelExpanded = expandedModels.has(node.id);

        const modelGroup = el('div', 'model-group');
        modelGroup.dataset.nodeId = node.id;

        const modelHeader = el('div', 'model-group-header');
        const modelChevron = el('span', 'chevron' + (isModelExpanded ? ' open' : ''));
        modelChevron.innerHTML = '&#9654;';
        const modelName = el('span', 'model-group-name');
        modelName.textContent = modelId;
        modelName.title = modelId;

        const ratioDiv = el('div', 'model-ratio');
        ratioDiv.innerHTML = '<div class="model-ratio-bar"><div class="model-ratio-fill" style="width:'
            + (modelRatio * 100).toFixed(0) + '%;background:' + barColor + '"></div></div>'
            + '<span class="model-ratio-text">' + numLayersNode + '/' + numLayersTotal + '</span>';

        modelHeader.appendChild(modelChevron);
        modelHeader.appendChild(modelName);
        modelHeader.appendChild(ratioDiv);

        const modelContent = el('div', 'model-group-content' + (isModelExpanded ? '' : ' collapsed'));

        // Layers inside model content
        const sortedLayers = [...node.layers].sort((a, b) => {
            return parseInt(a.replace('model.layers.', '')) - parseInt(b.replace('model.layers.', ''));
        });

        sortedLayers.forEach(layerName => {
            const detail = data.layer_details ? data.layer_details[layerName] : null;
            modelContent.appendChild(buildLayerItem(layerName, detail, node));
        });

        modelHeader.addEventListener('click', () => {
            modelContent.classList.toggle('collapsed');
            modelChevron.classList.toggle('open');
        });

        modelGroup.appendChild(modelHeader);
        modelGroup.appendChild(modelContent);
        card.appendChild(modelGroup);

        return card;
    }

    function buildLayerItem(layerName, detail, node) {
        const item = el('div', 'layer-item');
        item.dataset.layer = layerName;
        const layerNum = layerName.replace('model.layers.', '');
        const totalBytes = detail ? detail.total_bytes : 0;
        const isExpanded = expandedLayers.has(layerName);

        // Header
        const header = el('div', 'layer-header');
        const chevron = el('span', 'chevron' + (isExpanded ? ' open' : ''));
        chevron.innerHTML = '&#9654;';
        const label = el('span', 'layer-label');
        label.textContent = 'Layer ' + layerNum;
        const size = el('span', 'layer-size');
        size.textContent = humanBytes(totalBytes);

        header.appendChild(chevron);
        header.appendChild(label);
        header.appendChild(size);

        // Tensor list (collapsed by default)
        const tensorList = el('div', 'tensor-list' + (isExpanded ? '' : ' collapsed'));
        const barColor = node.isMaster ? 'var(--color-brand-500)' : 'var(--color-accent-500)';

        if (detail && detail.tensors) {
            const maxBytes = Math.max(...detail.tensors.map(t => t.size_bytes), 1);

            detail.tensors.forEach(t => {
                const pctOfLayer = totalBytes > 0 ? (t.size_bytes / totalBytes * 100).toFixed(1) : '0.0';
                const barPct = (t.size_bytes / maxBytes * 100).toFixed(1);

                const row = el('div', 'tensor-row');
                const name = el('span', 'tensor-name');
                name.textContent = t.short_name;
                name.title = t.dtype + ' [' + t.shape.join(', ') + '] \u2014 ' + t.name;

                const sz = el('span', 'tensor-meta');
                sz.textContent = humanBytes(t.size_bytes);

                const bar = el('div', 'tensor-bar');
                bar.innerHTML = '<div class="tensor-bar-fill" style="width:' + barPct + '%;background:' + barColor + '"></div>';

                const pctEl = el('span', 'tensor-pct');
                pctEl.textContent = pctOfLayer + '%';

                row.appendChild(name);
                row.appendChild(sz);
                row.appendChild(bar);
                row.appendChild(pctEl);
                tensorList.appendChild(row);
            });
        }

        header.addEventListener('click', () => {
            tensorList.classList.toggle('collapsed');
            chevron.classList.toggle('open');
        });

        item.appendChild(header);
        item.appendChild(tensorList);
        return item;
    }

    // Auto-refresh topology every 10s
    setInterval(() => {
        if (location.hash === '#cluster' || !location.hash) loadTopology();
    }, 10000);

    // ── Chat View ───────────────────────────────
    const messagesEl = document.getElementById('messages');
    const emptyEl = document.getElementById('chat-empty');
    const textarea = document.getElementById('chat-textarea');
    const sendBtn = document.getElementById('send-btn');
    const statsEl = document.getElementById('chat-stats');
    let chatHistory = [];
    let generating = false;

    textarea.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);

    async function sendMessage() {
        const text = textarea.value.trim();
        if (!text || generating) return;

        emptyEl.style.display = 'none';
        generating = true;
        sendBtn.disabled = true;
        textarea.value = '';
        textarea.style.height = 'auto';
        statsEl.textContent = '';

        chatHistory.push({ role: 'user', content: text });
        appendMessage('user', text);

        const { bubble } = appendMessage('assistant', '');
        let fullContent = '';
        let tokenCount = 0;
        let firstTokenTime = null;
        let lastTokenTime = null;

        try {
            const resp = await fetch('/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatHistory, stream: true, max_tokens: 4096 }),
            });

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const payload = line.slice(6).trim();
                    if (payload === '[DONE]') continue;
                    try {
                        const chunk = JSON.parse(payload);
                        const delta = chunk.choices?.[0]?.delta;
                        if (delta?.content) {
                            const now = performance.now();
                            if (firstTokenTime === null) firstTokenTime = now;
                            lastTokenTime = now;
                            tokenCount++;
                            fullContent += delta.content;
                            bubble.innerHTML = renderMarkdown(fullContent);
                            messagesEl.scrollTop = messagesEl.scrollHeight;

                            if (tokenCount > 1) {
                                const elapsed = (lastTokenTime - firstTokenTime) / 1000;
                                const tps = ((tokenCount - 1) / elapsed).toFixed(1);
                                statsEl.textContent = tokenCount + ' tokens \u00b7 ' + tps + ' tok/s';
                            }
                        }
                    } catch {}
                }
            }

            chatHistory.push({ role: 'assistant', content: fullContent });

            if (tokenCount > 1 && firstTokenTime !== null) {
                const elapsed = (lastTokenTime - firstTokenTime) / 1000;
                const tps = ((tokenCount - 1) / elapsed).toFixed(1);
                statsEl.textContent = tokenCount + ' tokens \u00b7 ' + tps + ' tok/s \u00b7 ' + elapsed.toFixed(1) + 's';
            }
        } catch (e) {
            bubble.innerHTML = '<span style="color:var(--color-danger)">Error: ' + esc(e.message) + '</span>';
        }

        generating = false;
        sendBtn.disabled = false;
        textarea.focus();
    }

    function appendMessage(role, content) {
        const msg = document.createElement('div');
        msg.className = 'message ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? 'U' : 'AI';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = content ? renderMarkdown(content) : '';

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return { msg, bubble };
    }

    function renderMarkdown(text) {
        let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => '<pre><code>' + code + '</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\n\n/g, '</p><p>');
        html = html.replace(/\n/g, '<br>');
        return '<p>' + html + '</p>';
    }
})();
</script>
